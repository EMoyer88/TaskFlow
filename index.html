<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#185FA5;--c1l:#E6F1FB;--c1m:#B5D4F4;
  --bg:#F4F6F9;--white:#ffffff;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#e2e6ed;--border2:#c8d0db;
  --radius:8px;--radius-lg:12px;
  --sidebar:220px;
  --success-bg:#EAF3DE;--success:#3B6D11;--success-border:#C0DD97;
  --danger-bg:#FCEBEB;--danger:#A32D2D;--danger-border:#F7C1C1;
  --warn-bg:#FAEEDA;--warn:#854F0B;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:16px 14px 12px;font-size:15px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--c1)}
.logo-icon{width:28px;height:28px;background:var(--c1);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2}
.sidebar-nav{padding:10px 6px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;user-select:none}
.nav-item:hover{background:#f0f4f8;color:var(--text)}
.nav-item.active{background:var(--c1l);color:var(--c1);font-weight:500}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.badge{margin-left:auto;background:#eef2f7;color:var(--text2);font-size:10px;padding:1px 6px;border-radius:8px;font-weight:500}
.nav-item.active .badge{background:var(--c1m);color:var(--c1)}
.sync-panel{padding:10px 12px;border-top:1px solid var(--border)}
.sync-status{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text2);margin-bottom:7px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .3s}
.sync-dot.on{background:#639922}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:0 18px;height:50px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--white);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;flex:1}
.view-tabs{display:flex;gap:1px;background:#eef2f7;padding:3px;border-radius:var(--radius)}
.tab{padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .15s}
.tab.active{background:var(--white);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--white);color:var(--text);font-size:12.5px;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500}
.btn:hover{background:#f5f7fa;border-color:#b0bcc8}
.btn-primary{background:var(--c1);color:#fff;border-color:var(--c1)}
.btn-primary:hover{background:#1452a0;border-color:#1452a0}
.btn svg{width:13px;height:13px}
.content{flex:1;overflow-y:auto;padding:18px}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search{flex:1;min-width:140px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--white);color:var(--text);font-family:inherit}
.search:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
select.fsel{padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:12.5px;background:var(--white);color:var(--text2);font-family:inherit;cursor:pointer}

/* Task cards */
.task-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;user-select:none}
.task-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.task-card.completed{opacity:.55}
.task-card.dragging{opacity:.35;box-shadow:0 6px 20px rgba(0,0,0,.15)}
.task-card.drop-left::before{content:'Add as subtask';position:absolute;left:0;top:0;bottom:0;width:50%;background:rgba(234,243,222,.9);border:2px dashed #639922;border-radius:var(--radius-lg) 0 0 var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#3B6D11;pointer-events:none;z-index:2}
.task-card.drop-right::after{content:'Set as dependency';position:absolute;right:0;top:0;bottom:0;width:50%;background:rgba(238,237,254,.9);border:2px dashed #534AB7;border-radius:0 var(--radius-lg) var(--radius-lg) 0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#534AB7;pointer-events:none;z-index:2}
.task-header{display:flex;align-items:flex-start;gap:8px}
.drag-handle{color:var(--text3);font-size:13px;cursor:grab;padding:1px 2px;flex-shrink:0;margin-top:1px;opacity:.4;transition:opacity .15s}
.drag-handle:hover{opacity:.8}
.task-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check:hover{border-color:var(--c1)}
.task-check.done{background:var(--c1);border-color:var(--c1)}
.task-check.done::after{content:'';width:5px;height:5px;border-right:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(45deg) translate(-1px,-1px);display:block}
.task-title{font-size:13.5px;font-weight:500;flex:1;line-height:1.4}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:7px;margin-left:25px;flex-wrap:wrap}
.chip{font-size:10.5px;padding:2px 7px;border-radius:8px;font-weight:500}
.chip-high{background:#FCEBEB;color:#A32D2D}
.chip-med{background:#FAEEDA;color:#854F0B}
.chip-low{background:#EAF3DE;color:#3B6D11}
.chip-assign{background:#f0f4f8;color:var(--text2)}
.chip-date{background:var(--c1l);color:var(--c1)}
.chip-date.overdue{background:#FCEBEB;color:#A32D2D}
.chip-recur{background:#FBEAF0;color:#993556}
.chip-dep{background:#EEEDFE;color:#534AB7}
.progress-bar{height:3px;background:#eef2f7;border-radius:2px;margin:7px 0 0 25px;overflow:hidden}
.progress-fill{height:100%;background:var(--c1);border-radius:2px;transition:width .3s}
.sub-count{font-size:11px;color:var(--text3);margin-top:3px;margin-left:25px}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none}
.section-hdr:hover .section-lbl{color:var(--text2)}
.section-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.section-toggle{font-size:11px;color:var(--text3);transition:transform .2s}
.section-toggle.collapsed{transform:rotate(-90deg)}
.section-body{transition:all .2s}
.chip-future{background:#EEEDFE;color:#534AB7}
.chip-recurring-inst{background:#FBEAF0;color:#993556;font-size:9.5px}
.drag-hint{text-align:center;font-size:11px;color:var(--text3);padding:4px 0 12px;display:flex;align-items:center;justify-content:center;gap:16px}
.drag-hint span{display:flex;align-items:center;gap:5px}
.dhdot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* Calendar */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-nav h3{font-size:15px;font-weight:600;flex:1;text-align:center}
.cal-wrap{width:100%}
.cal-table{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;table-layout:fixed}
.cal-th{background:#f5f7fa;padding:8px 4px;text-align:center;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);width:calc(100%/7)}
.cal-td{vertical-align:top;padding:5px;height:85px;border:1px solid var(--border);width:calc(100%/7)}
.cal-td.other{background:#fafbfc;opacity:.6}
.cal-date{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11.5px;color:var(--text2);margin-bottom:3px;border-radius:50%}
.cal-td.today .cal-date{background:var(--c1);color:#fff;font-weight:600}
.cal-chip{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;background:var(--c1l);color:var(--c1);line-height:1.4;font-weight:500}
.cal-chip.high{background:#FCEBEB;color:#A32D2D}
.cal-chip.done{background:#f0f4f8;color:var(--text3)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:620px;box-shadow:0 10px 40px rgba(0,0,0,.18);overflow:hidden}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-size:15px;font-weight:600}
.modal-x{cursor:pointer;color:var(--text2);background:none;border:none;font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;font-family:inherit}
.modal-x:hover{background:#f0f4f8}
.modal-body{padding:20px;max-height:74vh;overflow-y:auto}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:600}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--white);color:var(--text);font-family:inherit}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.form-row textarea{resize:vertical;min-height:72px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rem-row{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.rem-row select{flex:1;font-size:12px;padding:5px 7px}

/* Detail panel */
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:370px;background:var(--white);border-left:1px solid var(--border);z-index:50;overflow-y:auto;transform:translateX(100%);transition:transform .22s ease;box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.detail-panel.open{transform:translateX(0)}
.detail-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--white);position:sticky;top:0;z-index:1}
.detail-body{padding:16px}
.detail-sec{margin-bottom:18px}
.detail-sec h4{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px}
.note-box{background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:13px;line-height:1.6;color:var(--text2)}
.completion-banner{background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--radius);padding:9px 12px;font-size:12.5px;color:var(--success);margin-bottom:14px;font-weight:500}
.dep-item{display:flex;align-items:center;gap:7px;font-size:13px;padding:4px 0;color:var(--text2)}
.subtask-row{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:13px;color:var(--text2)}
.sub-check{width:14px;height:14px;border-radius:50%;border:1px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sub-check:hover{border-color:var(--c1)}
.sub-check.done{background:var(--c1);border-color:var(--c1)}
.sub-check.done::after{content:'';width:4px;height:4px;border-right:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(45deg) translate(-1px,-1px);display:block}

/* Sync modal */
.sync-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:440px;box-shadow:0 10px 40px rgba(0,0,0,.18);overflow:hidden}
.team-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.team-row:last-child{border-bottom:none}
.toggle{width:36px;height:20px;border-radius:10px;background:#dde3ea;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s;border:none}
.toggle.on{background:var(--c1)}
.toggle::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:19px}

/* Loading/error states */
.state-box{text-align:center;padding:60px 20px;color:var(--text3)}
.state-box .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--c1);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius);padding:12px 14px;color:var(--danger);font-size:13px;margin-bottom:14px;line-height:1.5}

/* Toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:var(--radius);font-size:13px;z-index:300;transition:opacity .3s;white-space:nowrap;pointer-events:none;opacity:0}
</style>
</head>

<!-- TASK MODAL -->
<div id="task-modal" style="display:none" class="modal-bg">
<div class="modal">
  <div class="modal-hdr"><h2 id="modal-title">New Task</h2><button class="modal-x" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-row"><label>Task title *</label><input type="text" id="f-title" placeholder="Enter task name..."></div>
    <div class="form-grid">
      <div class="form-row"><label>Assigned to</label>

<script>
// ── State ──────────────────────────────────────────────────
let tasks=[], subtasks=[], reminders=[];
let nav='all', view='list', editingId=null, tempSubs=[], calM=new Date().getMonth(), calY=new Date().getFullYear();
let dragId=null, msalInstance=null, accessToken=null, currentUser=null;
const syncState={Accounting:false,'A/R':false,'A/P':false,'H/R':false,Auto:false};
const today=new Date(); today.setHours(0,0,0,0);

// ── MSAL Auth ──────────────────────────────────────────────
async function initAuth(){
  if(!CONFIG.clientId||CONFIG.clientId==='YOUR_CLIENT_ID_HERE'){
    showDemoMode();
    return;
  }
  try{
    msalInstance=new msal.PublicClientApplication({
      auth:{clientId:CONFIG.clientId,authority:`https://login.microsoftonline.com/${CONFIG.tenantId}`,redirectUri:"https://emoyer88.github.io/TaskFlow/"},
      cache:{cacheLocation:'sessionStorage'}
    });
    await msalInstance.initialize();
    const resp=await msalInstance.handleRedirectPromise();
    let account=resp?.account||msalInstance.getAllAccounts()[0];
    if(!account){
      await msalInstance.loginRedirect({scopes:['Sites.ReadWrite.All','Calendars.ReadWrite','User.ReadBasic.All']});
      return;
    }
    const tokenResp=await msalInstance.acquireTokenSilent({scopes:['https://graph.microsoft.com/Sites.ReadWrite.All','https://graph.microsoft.com/User.ReadBasic.All'],account});
    accessToken=tokenResp.accessToken;
    currentUser=account.name||account.username;
    // Also fetch full profile for display name
    try{
      const profile=await graphGet('/me?=displayName,mail');
      currentUser=profile.displayName||currentUser;
    }catch(e){}
    await loadData();
  }catch(e){
    showError('Authentication failed: '+e.message+'\n\nMake sure your Client ID is set in the CONFIG block at the top of this file.');
  }
}

function dOff(n){let d=new Date(today);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}

// ── SharePoint Graph API ───────────────────────────────────
async function graphGet(url){
  const headers={Authorization:'Bearer '+accessToken};
  if(url.includes('')) headers['ConsistencyLevel']='eventual';
  const r=await fetch('https://graph.microsoft.com/v1.0'+url,{headers});
  if(!r.ok) throw new Error(`Graph API error ${r.status}: ${await r.text()}`);
  return r.json();
}
async function graphPost(url,body){
  const r=await fetch('https://graph.microsoft.com/v1.0'+url,{method:'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(`Graph API error ${r.status}: ${await r.text()}`);
  return r.json();
}
async function graphPatch(url,body){
  const r=await fetch('https://graph.microsoft.com/v1.0'+url,{method:'PATCH',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(`Graph API error ${r.status}: ${await r.text()}`);
  return r.json();
}
async function graphDelete(url){
  const r=await fetch('https://graph.microsoft.com/v1.0'+url,{method:'DELETE',headers:{Authorization:'Bearer '+accessToken}});
  if(!r.ok) throw new Error(`Graph API error ${r.status}`);
}

async function getSiteId(){
  if(CONFIG._siteId) return CONFIG._siteId;
  const hostname='admoyer.sharepoint.com';
  const path='/sites/Accounting';
  const data=await graphGet(`/sites/${hostname}:${path}`);
  CONFIG._siteId=data.id;
  return data.id;
}

async function getListId(listName){
  if(CONFIG._listIds?.[listName]) return CONFIG._listIds[listName];
  const siteId=await getSiteId();
  const data=await graphGet(`/sites/${siteId}/lists?$filter=displayName eq '${listName}'`);
  const id=data.value[0]?.id;
  if(!id) throw new Error(`List "${listName}" not found`);
  CONFIG._listIds=CONFIG._listIds||{};
  CONFIG._listIds[listName]=id;
  return id;
}

async function loadData(){
  if(!accessToken){showDemoMode();return}
  setLoading(true);
  try{
    const siteId=await getSiteId();
    const [tListId,sListId,rListId]=await Promise.all([
      getListId(CONFIG.lists.tasks),
      getListId(CONFIG.lists.subtasks),
      getListId(CONFIG.lists.reminders)
    ]);

    const [tData,sData,rData]=await Promise.all([
      graphGet(`/sites/${siteId}/lists/${tListId}/items?$expand=fields&$top=500`),
      graphGet(`/sites/${siteId}/lists/${sListId}/items?$expand=fields&$top=500`),
      graphGet(`/sites/${siteId}/lists/${rListId}/items?$expand=fields&$top=500`)
    ]);

    subtasks=sData.value.map(i=>({id:i.id,...i.fields}));
    reminders=rData.value.map(i=>({id:i.id,...i.fields}));
    tasks=tData.value.map(i=>{
      const f={id:i.id,...i.fields};
      f._subtasks=subtasks.filter(s=>String(s.ParentTaskID)===String(i.fields.id||i.id));
      f._reminders=reminders.filter(r=>String(r.ParentTaskID)===String(i.fields.id||i.id));
      f.IsCompleted=f.IsCompleted===true||f.IsCompleted==='Yes';
      f.IsFutureRecurring=f.IsFutureRecurring===true||f.IsFutureRecurring==='Yes'||f.IsFutureRecurring==='true';
      return f;
    });
    render();
    // Daily check - runs in background, doesn't block UI
    const lastCheck = sessionStorage.getItem('lastRecurCheck');
    const todayStr = today.toISOString().split('T')[0];
    if(lastCheck !== todayStr){
      sessionStorage.setItem('lastRecurCheck', todayStr);
      checkAndExtendRecurring().catch(e=>console.warn('Recurring check failed:',e));
    }
  }catch(e){
    showError('Failed to load data from SharePoint: '+e.message);
  }finally{
    setLoading(false);
  }
}

async function saveTaskToSP(fields, editId){
  const siteId=await getSiteId();
  const listId=await getListId(CONFIG.lists.tasks);
  const body={fields:{
    Title:fields.title,
    AssignedTo:fields.assign,
    Team:fields.team,
    DueDate:fields.due||null,
    Priority:fields.priority,
    Recurring:fields.recur||null,
    DependsOnTaskID:fields.dep||null,
    Notes:fields.notes,
    IsCompleted:fields.done?true:false,
    CompletedAt:fields.completedAt||null,
    CompletionNotify:fields.notify||null,
    IsFutureRecurring:fields.isFuture?true:false,
    RecurEndType:fields.recurEndType||null,
    RecurEndDate:fields.recurEndDate||null,
    RecurEndCount:fields.recurEndCount?parseInt(fields.recurEndCount):null,
    RecurParentId:fields.recurParentId?parseInt(fields.recurParentId):null,
    RecurOccurrence:fields.recurOccurrence?parseInt(fields.recurOccurrence):null
  }};
  if(editId){
    await graphPatch(`/sites/${siteId}/lists/${listId}/items/${editId}`,body);
    return editId;
  } else {
    const res=await graphPost(`/sites/${siteId}/lists/${listId}/items`,body);
    return res.id;
  }
}

async function saveSubtasksToSP(taskId, subs){
  const siteId=await getSiteId();
  const listId=await getListId(CONFIG.lists.subtasks);
  // Delete old subtasks for this task
  const old=subtasks.filter(s=>String(s.ParentTaskID)===String(taskId));
  await Promise.all(old.map(s=>graphDelete(`/sites/${siteId}/lists/${listId}/items/${s.id}`)));
  // Create new
  await Promise.all(subs.map(s=>graphPost(`/sites/${siteId}/lists/${listId}/items`,{fields:{Title:s.t,ParentTaskID:taskId,IsCompleted:s.done?true:false}})));
}

async function saveRemindersToSP(taskId, rems){
  const siteId=await getSiteId();
  const listId=await getListId(CONFIG.lists.reminders);
  const old=reminders.filter(r=>String(r.ParentTaskID)===String(taskId));
  await Promise.all(old.map(r=>graphDelete(`/sites/${siteId}/lists/${listId}/items/${r.id}`)));
  await Promise.all(rems.map(r=>graphPost(`/sites/${siteId}/lists/${listId}/items`,{fields:{ParentTaskID:taskId,ReminderType:r.type,DaysBeforeDue:r.time,NotifyWho:r.who}})));
}

async function deleteTaskFromSP(taskId){
  const siteId=await getSiteId();
  const [tId,sId,rId]=await Promise.all([getListId(CONFIG.lists.tasks),getListId(CONFIG.lists.subtasks),getListId(CONFIG.lists.reminders)]);
  const oldSubs=subtasks.filter(s=>String(s.ParentTaskID)===String(taskId));
  const oldRems=reminders.filter(r=>String(r.ParentTaskID)===String(taskId));
  await Promise.all([
    graphDelete(`/sites/${siteId}/lists/${tId}/items/${taskId}`),
    ...oldSubs.map(s=>graphDelete(`/sites/${siteId}/lists/${sId}/items/${s.id}`)),
    ...oldRems.map(r=>graphDelete(`/sites/${siteId}/lists/${rId}/items/${r.id}`))
  ]);
}

// ── Render ─────────────────────────────────────────────────
function render(){
  updateBadges();
  if(view==='calendar') renderCalendar(); else renderList();
}

function updateBadges(){
  const now=new Date();now.setHours(0,0,0,0);
  document.getElementById('b-all').textContent=tasks.filter(t=>!t.IsCompleted).length;
  document.getElementById('b-mine').textContent=tasks.filter(t=>!t.IsCompleted&&t.AssignedTo===currentUser).length;
  document.getElementById('b-overdue').textContent=tasks.filter(t=>!t.IsCompleted&&t.DueDate&&new Date(t.DueDate)<now).length;
  document.getElementById('b-done').textContent=tasks.filter(t=>t.IsCompleted).length;
  const anyOn=Object.values(syncState).some(v=>v);
  document.getElementById('sync-dot').className='sync-dot'+(anyOn?' on':'');
  document.getElementById('sync-lbl').textContent=anyOn?'Outlook: syncing':'Outlook: off';
}

function getFiltered(){
  const now=new Date();now.setHours(0,0,0,0);
  let ft=tasks;
  if(nav==='mine') ft=ft.filter(t=>t.AssignedTo===currentUser);
  if(nav==='overdue') ft=ft.filter(t=>!t.IsCompleted&&t.DueDate&&new Date(t.DueDate)<now);
  if(nav==='completed') ft=ft.filter(t=>t.IsCompleted);
  if(['Accounting','A/R','A/P','H/R','Auto'].includes(nav)) ft=ft.filter(t=>t.Team===nav);
  return ft;
}

let sectionState={active:true,future:false,completed:false};

function toggleSection(key){
  sectionState[key]=!sectionState[key];
  render();
}

function renderList(){
  const c=document.getElementById('main-content');
  const q=(document.getElementById('qs')?.value||'').toLowerCase();
  const pf=document.getElementById('qp')?.value||'';
  const af=document.getElementById('qa')?.value||'';
  const now=new Date();now.setHours(0,0,0,0);

  let vis=getFiltered().filter(t=>{
    if(q&&!t.Title?.toLowerCase().includes(q)&&!t.AssignedTo?.toLowerCase().includes(q)) return false;
    if(pf&&t.Priority!==pf) return false;
    if(af&&t.AssignedTo!==af) return false;
    return true;
  });

  const active=vis.filter(t=>!t.IsCompleted&&!t.IsFutureRecurring).sort((a,b)=>new Date(a.DueDate||'9999')-new Date(b.DueDate||'9999'));
  const future=vis.filter(t=>!t.IsCompleted&&t.IsFutureRecurring).sort((a,b)=>new Date(a.DueDate||'9999')-new Date(b.DueDate||'9999'));
  const done=vis.filter(t=>t.IsCompleted);
  const assignees=[...new Set(tasks.map(t=>t.AssignedTo).filter(Boolean))].sort();

  let html='<div class="filter-bar">'
    +'<input class="search" id="qs" placeholder="Search tasks..." value="'+q+'" oninput="render()">'
    +'<select class="fsel" id="qp" onchange="render()">'
    +'<option value="">All priorities</option>'
    +'<option value="High"'+(pf==='High'?' selected':'')+'>High</option>'
    +'<option value="Medium"'+(pf==='Medium'?' selected':'')+'>Medium</option>'
    +'<option value="Low"'+(pf==='Low'?' selected':'')+'>Low</option>'
    +'</select>'
    +'<select class="fsel" id="qa" onchange="render()">'
    +'<option value="">All assignees</option>'
    +assignees.map(p=>'<option value="'+p+'"'+(af===p?' selected':'')+'>'+p+'</option>').join('')
    +'</select></div>'
    +'<div class="drag-hint">'
    +'<span><span class="dhdot" style="background:#EAF3DE;border:1px solid #639922"></span><span style="color:#3B6D11">Drop left = subtask</span></span>'
    +'<span><span class="dhdot" style="background:#EEEDFE;border:1px solid #534AB7"></span><span style="color:#534AB7">Drop right = dependency</span></span>'
    +'</div>';

  if(!active.length&&!future.length&&!done.length){
    html+='<div class="state-box"><p>No tasks here</p></div>';
    c.innerHTML=html;return;
  }

  // Active section - open by default
  html+='<div class="section-hdr" onclick="toggleSection(\'active\')">'
    +'<span class="section-lbl">Active — '+active.length+'</span>'
    +'<span class="section-toggle'+(sectionState.active?'':' collapsed')+'">&#9662;</span>'
    +'</div>'
    +'<div class="section-body" style="display:'+(sectionState.active?'block':'none')+'">'
    +(active.length?active.map(t=>cardHTML(t,now)).join(''):'<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">No active tasks</div>')
    +'</div>';

  // Future recurring section - collapsed by default
  if(future.length){
  html+='<div class="section-hdr" style="margin-top:16px" onclick="toggleSection(\'future\')">'
      +'<span class="section-lbl">Future Recurring — '+future.length+'</span>'
      +'<span class="section-toggle'+(sectionState.future?'':' collapsed')+'">&#9662;</span>'
      +'</div>'
      +'<div class="section-body" style="display:'+(sectionState.future?'block':'none')+'">'
      +future.map(t=>cardHTML(t,now)).join('')
      +'</div>';
  }

  // Completed section - collapsed by default
  html+='<div class="section-hdr" style="margin-top:16px" onclick="toggleSection(\'completed\')">'
    +'<span class="section-lbl">Completed — '+done.length+'</span>'
    +'<span class="section-toggle'+(sectionState.completed?'':' collapsed')+'">&#9662;</span>'
    +'</div>'
    +'<div class="section-body" style="display:'+(sectionState.completed?'block':'none')+'">'
    +(done.length?done.map(t=>cardHTML(t,now)).join(''):'<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">No completed tasks yet</div>')
    +'</div>';

  c.innerHTML=html;
  bindDrag();
}

function cardHTML(t,now){
  const due=t.DueDate?new Date(t.DueDate):null;
  const overdue=due&&due<now&&!t.IsCompleted;
  const subs=t._subtasks||[];
  const sd=subs.filter(s=>s.IsCompleted===true||s.IsCompleted==='Yes').length,st=subs.length,pct=st?Math.round(sd/st*100):0;
  const dl=due?due.toLocaleDateString('en-US',{month:'short',day:'numeric'}):'';
  const dep=t.DependsOnTaskID?tasks.find(x=>String(x.id)===String(t.DependsOnTaskID)):null;
  const prioClass={High:'chip-high',Medium:'chip-med',Low:'chip-low'}[t.Priority]||'chip-med';
  return `<div class="task-card${t.IsCompleted?' completed':''}" id="tc-${t.id}" data-id="${t.id}" draggable="true" onclick="openDetail('${t.id}')">
    <div class="task-header">
      <div class="drag-handle" title="Drag to set subtask or dependency">⠿</div>
      <div class="task-check${t.IsCompleted?' done':''}" onclick="toggleDone(event,'${t.id}')"></div>
      <div class="task-title${t.IsCompleted?' done':''}">${t.Title||''}</div>
    </div>
    <div class="task-meta">

// ── Drag & Drop ────────────────────────────────────────────
function bindDrag(){
  document.querySelectorAll('.task-card[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=el.dataset.id;el.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drop-left','drop-right'));dragId=null});
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      if(dragId===el.dataset.id) return;
      const mid=el.getBoundingClientRect().left+el.getBoundingClientRect().width/2;
      document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drop-left','drop-right'));
      el.classList.add(e.clientX<mid?'drop-left':'drop-right');
    });
    el.addEventListener('dragleave',()=>el.classList.remove('drop-left','drop-right'));
    el.addEventListener('drop',async e=>{
      e.preventDefault();e.stopPropagation();
      if(!dragId||dragId===el.dataset.id) return;
      const targetId=el.dataset.id;
      const isLeft=el.classList.contains('drop-left');
      el.classList.remove('drop-left','drop-right');
      const dragged=tasks.find(t=>String(t.id)===String(dragId));
      const target=tasks.find(t=>String(t.id)===String(targetId));
      if(!dragged||!target) return;
      if(isLeft){
        if(!target._subtasks) target._subtasks=[];
        if(!target._subtasks.find(s=>s.Title===dragged.Title)){
          target._subtasks.push({id:'new_'+Date.now(),Title:dragged.Title,ParentTaskID:targetId,IsCompleted:dragged.IsCompleted});
          if(accessToken){
            try{await saveSubtasksToSP(targetId,target._subtasks.map(s=>({t:s.Title,done:s.IsCompleted})))}
            catch(e){showError('Failed to save subtask: '+e.message)}
          }
        }
        showToast(`"${dragged.Title}" added as subtask of "${target.Title}"`);
      } else {
        dragged.DependsOnTaskID=targetId;
        if(accessToken){
          try{
            const siteId=await getSiteId();
            const listId=await getListId(CONFIG.lists.tasks);
            await graphPatch(`/sites/${siteId}/lists/${listId}/items/${dragged.id}`,{fields:{DependsOnTaskID:parseInt(targetId)||null}});
          }catch(e){showError('Failed to save dependency: '+e.message)}
        }
        showToast(`"${dragged.Title}" now depends on "${target.Title}"`);
      }
      render();
    });
  });
}

// ── Calendar ───────────────────────────────────────────────
let calHideCompleted = true;

function renderCalendar(){
  const c=document.getElementById('main-content');
  const first=new Date(calY,calM,1),last=new Date(calY,calM+1,0);
  const mName=first.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cells=[];
  for(let i=0;i<first.getDay();i++) cells.push({date:new Date(calY,calM,1-first.getDay()+i),cur:false});
  for(let d=1;d<=last.getDate();d++) cells.push({date:new Date(calY,calM,d),cur:true});
  const rem=(7-(cells.length%7))%7;
  for(let i=1;i<=rem;i++) cells.push({date:new Date(calY,calM+1,i),cur:false});

  let rows='';
  for(let r=0;r<cells.length/7;r++){
    rows+='<tr>';
    cells.slice(r*7,(r+1)*7).forEach(({date,cur})=>{
      const iso=date.toISOString().split('T')[0];
      const isToday=date.getTime()===today.getTime();
      let dayTasks=tasks.filter(t=>t.DueDate&&t.DueDate.startsWith(iso));
      if(calHideCompleted) dayTasks=dayTasks.filter(t=>!t.IsCompleted);
      const chips=dayTasks.map(t=>'<div class="cal-chip'+(t.Priority==='High'?' high':t.IsCompleted?' done':'')+'" onclick="openDetail('+JSON.stringify(String(t.id))+');event.stopPropagation()" title="'+t.Title+'">'+t.Title+'</div>').join('');
      rows+='<td class="cal-td'+(!cur?' other':'')+(isToday?' today':'')+'"><div class="cal-date">'+date.getDate()+'</div>'+chips+'</td>';
    });
    rows+='</tr>';
  }

  c.innerHTML='<div class="cal-nav">'
    +'<button class="btn" onclick="calPrev()">&#8249; Prev</button>'
    +'<h3>'+mName+'</h3>'
    +'<button class="btn" onclick="calNext()">Next &#8250;</button>'
    +'<button class="btn" onclick="toggleCalCompleted()" style="font-size:12px;margin-left:8px;background:'+(calHideCompleted?'var(--c1)':'var(--white)')+';color:'+(calHideCompleted?'#fff':'var(--text2)')+';border-color:'+(calHideCompleted?'var(--c1)':'var(--border2)')+';">'
    +(calHideCompleted?'Show completed':'Hide completed')
    +'</button>'
    +'</div>'
    +'<div class="cal-wrap"><table class="cal-table">'
    +'<thead><tr>'+days.map(d=>'<th class="cal-th">'+d+'</th>').join('')+'</tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table></div>'
    +'<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px">'
    +'<span style="font-size:11.5px;color:var(--text2);display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:var(--c1l);border-radius:2px;display:inline-block"></span>Normal</span>'
    +'<span style="font-size:11.5px;color:var(--text2);display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:#FCEBEB;border-radius:2px;display:inline-block"></span>High priority</span>'
    +(calHideCompleted?'':'<span style="font-size:11.5px;color:var(--text2);display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;background:#f0f4f8;border-radius:2px;display:inline-block"></span>Completed</span>')
    +'</div>';
}

function toggleCalCompleted(){
  calHideCompleted=!calHideCompleted;
  renderCalendar();
}
function calPrev(){calM--;if(calM<0){calM=11;calY--}render()}
function calNext(){calM++;if(calM>11){calM=0;calY++}render()}

async function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('Please enter a task title');return}
  const remRows=document.querySelectorAll('.rem-row');
  const rems=[...remRows].map(r=>({type:r.querySelector('.rt').value,time:parseInt(r.querySelector('.rtime').value),who:r.querySelector('.rwho').value}));
  const recurVal = document.getElementById('f-recur').value;
  const recurEndType = recurVal ? document.getElementById('f-recur-end').value||'never' : 'never';
  const recurEndDate = recurEndType==='date' ? (document.getElementById('f-recur-end-date').value||null) : null;
  const recurEndCount = recurEndType==='count' ? parseInt(document.getElementById('f-recur-end-count').value||0)||null : null;
  const fields={title,assign:document.getElementById('f-assign').value,team:document.getElementById('f-team').value,due:document.getElementById('f-due').value||null,priority:document.getElementById('f-priority').value,recur:recurVal||null,recurEndType,recurEndDate,recurEndCount,recurParentId:null,recurOccurrence:0,isFuture:false,dep:document.getElementById('f-dep').value||null,notes:document.getElementById('f-notes').value,notify:document.getElementById('f-notify').value,done:editingId?tasks.find(x=>String(x.id)===String(editingId))?.IsCompleted:false,completedAt:editingId?tasks.find(x=>String(x.id)===String(editingId))?.CompletedAt:null};

  const btn=document.getElementById('save-btn');
  btn.textContent='Saving...';btn.disabled=true;

  try{
    if(accessToken){
      const savedId=await saveTaskToSP(fields,editingId);
      await saveSubtasksToSP(savedId,tempSubs);
      await saveRemindersToSP(savedId,rems);
      // Generate future recurring instances BEFORE loadData clears state
      if(!editingId && fields.recur && fields.due){
        const savedTask={...fields,id:savedId,Title:fields.title,AssignedTo:fields.assign,
          Team:fields.team,DueDate:fields.due,Priority:fields.priority,
          Recurring:fields.recur,DependsOnTaskID:fields.dep,
          Notes:fields.notes,CompletionNotify:fields.notify};
        const subsSnapshot=[...tempSubs];
        const remsSnapshot=[...rems];
        await generateRecurringInstances(savedTask, subsSnapshot, remsSnapshot,
          recurEndType, recurEndDate, recurEndCount);
      }
      await loadData();
    } else {
      // Demo mode — update in memory
      const t={id:editingId||Date.now(),Title:fields.title,AssignedTo:fields.assign,Team:fields.team,DueDate:fields.due,Priority:fields.priority,Recurring:fields.recur,DependsOnTaskID:fields.dep,Notes:fields.notes,IsCompleted:fields.done||false,CompletedAt:fields.completedAt,CompletionNotify:fields.notify,_subtasks:tempSubs.map((s,i)=>({id:'tmp'+i,Title:s.t,IsCompleted:s.done,ParentTaskID:editingId||'new'})),_reminders:rems.map((r,i)=>({id:'tmpr'+i,ReminderType:r.type,DaysBeforeDue:r.time,NotifyWho:r.who}))};
      if(editingId) tasks=tasks.map(x=>String(x.id)===String(editingId)?t:x); else tasks.push(t);
    }
    closeModal();render();
    showToast(editingId?'Task updated':'Task created');
  }catch(e){
    showError('Failed to save: '+e.message);
  }finally{
    btn.textContent='Save task';btn.disabled=false;
  }
}

function setLoading(on){
  if(on) document.getElementById('main-content').innerHTML='<div class="state-box"><div class="spinner"></div><p>Loading from SharePoint...</p></div>';
}
function showError(msg){
  const c=document.getElementById('main-content');
  const existing=c.querySelector('.error-box');
  if(existing) existing.remove();
  const div=document.createElement('div');
  div.className='error-box';
  div.textContent=msg;
  c.prepend(div);
}
let toastT;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(toastT);toastT=setTimeout(()=>{el.style.opacity='0'},2800);
}


// ── Recurring Task Generation ───────────────────────────
function getNextDueDate(dueDateStr, recur){
  const d = new Date(dueDateStr);
  switch(recur){
    case 'Daily':     d.setDate(d.getDate()+1); break;
    case 'Weekly':    d.setDate(d.getDate()+7); break;
    case 'Biweekly':  d.setDate(d.getDate()+14); break;
    case 'Monthly':   d.setMonth(d.getMonth()+1); break;
    case 'Quarterly': d.setMonth(d.getMonth()+3); break;
    case 'Annually':  d.setFullYear(d.getFullYear()+1); break;
  }
  return d.toISOString().split('T')[0];
}

function recurIntervalDays(recur){
  const map={Daily:1,Weekly:7,Biweekly:14,Monthly:30,Quarterly:91,Annually:365};
  return map[recur]||30;
}

async function generateRecurringInstances(parentTask, subs, rems, recurEndType, recurEndDate, recurEndCount){
  if(!parentTask.Recurring||parentTask.Recurring==='') { console.warn('generateRecurring: no recur pattern'); return; }
  if(!parentTask.DueDate) { console.warn('generateRecurring: no due date'); return; }
  console.log('generateRecurring: starting for', parentTask.Title, 'recur:', parentTask.Recurring, 'endType:', recurEndType);
  const oneYearOut = new Date(today); oneYearOut.setFullYear(oneYearOut.getFullYear()+1);
  const endDate = recurEndType==='date'&&recurEndDate ? new Date(recurEndDate) : oneYearOut;
  const maxEnd = endDate < oneYearOut ? endDate : oneYearOut;
  const maxCount = recurEndType==='count'&&recurEndCount ? parseInt(recurEndCount) : 999;

  let currentDate = parentTask.DueDate;
  let count = 0;
  const instancesToCreate = [];

  while(count < maxCount){
    const nextDate = getNextDueDate(currentDate, parentTask.Recurring);
    const nextDt = new Date(nextDate);
    if(nextDt > maxEnd) break;
    instancesToCreate.push(nextDate);
    currentDate = nextDate;
    count++;
  }

  console.log('generateRecurring: creating', instancesToCreate.length, 'instances:', instancesToCreate);
  for(let i=0; i<instancesToCreate.length; i++){
    const instanceFields = {
      title: parentTask.Title,
      assign: parentTask.AssignedTo,
      team: parentTask.Team,
      due: instancesToCreate[i],
      priority: parentTask.Priority,
      recur: parentTask.Recurring,
      dep: parentTask.DependsOnTaskID||null,
      notes: parentTask.Notes||'',
      notify: parentTask.CompletionNotify||'None',
      done: false,
      completedAt: null,
      isFuture: true,
      recurEndType: recurEndType||'never',
      recurEndDate: recurEndDate||null,
      recurEndCount: recurEndCount||null,
      recurParentId: parentTask.id,
      recurOccurrence: i+1
    };
    if(accessToken){
      try{
        const savedId = await saveTaskToSP(instanceFields, null);
        if(subs&&subs.length) await saveSubtasksToSP(savedId, subs);
        if(rems&&rems.length) await saveRemindersToSP(savedId, rems);
      }catch(e){ console.error('Failed to create recurring instance:', e); }
    }
  }
}

async function activateNextRecurring(completedTask){
  if(!completedTask.Recurring) return;
  // Find next future recurring instance of this task chain
  const parentId = completedTask.RecurParentId || completedTask.id;
  const futureInstances = tasks.filter(t=>
    (String(t.RecurParentId)===String(parentId) || String(t.id)===String(parentId))
    && t.IsFutureRecurring && !t.IsCompleted
  ).sort((a,b)=>new Date(a.DueDate)-new Date(b.DueDate));

  if(futureInstances.length>0){
    const next = futureInstances[0];
    next.IsFutureRecurring = false;
    if(accessToken){
      try{
        const siteId = await getSiteId();
        const listId = await getListId(CONFIG.lists.tasks);
        await graphPatch('/sites/'+siteId+'/lists/'+listId+'/items/'+next.id, {fields:{IsFutureRecurring:false}});
      }catch(e){ console.error('Failed to activate next recurring:', e); }
    }
    showToast('Next recurring instance is now active: '+next.Title+' due '+next.DueDate);
  }

  // Check if we need to generate more (rolling 1-year window)
  const allInstances = tasks.filter(t=>
    String(t.RecurParentId)===String(parentId) || String(t.id)===String(parentId)
  );
  const lastInstance = allInstances.filter(t=>!t.IsCompleted).sort((a,b)=>new Date(b.DueDate)-new Date(a.DueDate))[0];
  if(lastInstance){
    const lastDate = new Date(lastInstance.DueDate);
    const oneYearOut = new Date(today); oneYearOut.setFullYear(oneYearOut.getFullYear()+1);
    if(lastDate < oneYearOut){
      // Generate one more instance to keep the rolling window
      const newDate = getNextDueDate(lastInstance.DueDate, completedTask.Recurring);
      const endDate = completedTask.RecurEndDate ? new Date(completedTask.RecurEndDate) : oneYearOut;
      if(new Date(newDate) <= endDate){
        const instanceFields = {
          title:completedTask.Title, assign:completedTask.AssignedTo, team:completedTask.Team,
          due:newDate, priority:completedTask.Priority, recur:completedTask.Recurring,
          dep:completedTask.DependsOnTaskID||null, notes:completedTask.Notes||'',
          notify:completedTask.CompletionNotify||'None', done:false, completedAt:null,
          isFuture:true, recurEndType:completedTask.RecurEndType||'never',
          recurEndDate:completedTask.RecurEndDate||null, recurEndCount:null,
          recurParentId:parentId, recurOccurrence:(lastInstance.RecurOccurrence||0)+1
        };
        if(accessToken){
          try{
            const savedId = await saveTaskToSP(instanceFields, null);
            const subs = (completedTask._subtasks||[]).map(s=>({t:s.Title,done:false}));
            const rems = (completedTask._reminders||[]).map(r=>({type:r.ReminderType,time:r.DaysBeforeDue,who:r.NotifyWho}));
            if(subs.length) await saveSubtasksToSP(savedId, subs);
            if(rems.length) await saveRemindersToSP(savedId, rems);
          }catch(e){ console.error('Failed to extend recurring chain:', e); }
        }
      }
    }
  }
}

async function checkAndExtendRecurring(){
  // Called on app load - ensures all recurring chains have instances up to 1 year out
  if(!accessToken) return;
  const oneYearOut = new Date(today); oneYearOut.setFullYear(oneYearOut.getFullYear()+1);
  const recurringTasks = tasks.filter(t=>t.Recurring&&!t.IsFutureRecurring&&!t.IsCompleted);
  for(const t of recurringTasks){
    const parentId = t.RecurParentId||t.id;
    const allInChain = tasks.filter(x=>x.RecurParentId===parentId||String(x.id)===String(parentId));
    const lastFuture = allInChain.filter(x=>x.IsFutureRecurring).sort((a,b)=>new Date(b.DueDate)-new Date(a.DueDate))[0];
    const checkDate = lastFuture ? new Date(lastFuture.DueDate) : new Date(t.DueDate||today);
    if(checkDate < oneYearOut){
      await activateNextRecurring(t);
    }
  }
}
function getReminderRows(){
  const remRows=document.querySelectorAll('.rem-row');
  return [...remRows].map(r=>({type:r.querySelector('.rt').value,time:parseInt(r.querySelector('.rtime').value),who:r.querySelector('.rwho').value}));
}

  if(!val){ document.getElementById('f-recur-end-date').style.display='none'; document.getElementById('f-recur-end-count').style.display='none'; }
}
function toggleRecurEndDate(){
  const type=document.getElementById('f-recur-end').value;
  document.getElementById('recur-end-date-row').style.display=type==='date'?'block':'none';
  document.getElementById('recur-end-count-row').style.display=type==='count'?'block':'none';
}

// ── People Search ──────────────────────────────────────
let searchTimer = null;

async function searchPeople(query) {
  const dropdown = document.getElementById('people-dropdown');
  if(!dropdown) return;
  if(!query || query.length < 2){ dropdown.style.display='none'; return; }
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    try{
      let results = [];
      if(accessToken){
        const q = encodeURIComponent(query);
        const url1 = 'https://graph.microsoft.com/v1.0/users?$select=displayName,mail,userPrincipalName&$top=10&$filter=startswith(displayName,' + "'" + q + "')";
        const data = await fetch(url1, {headers:{Authorization:'Bearer '+accessToken}}).then(r=>r.json());
        results = (data.value||[]).map(u=>({name:u.displayName, email:u.mail||u.userPrincipalName}));
        if(!results.length){
          const url2 = 'https://graph.microsoft.com/v1.0/me/people?$search=' + q + '&$top=10&$select=displayName,scoredEmailAddresses';
          const data2 = await fetch(url2, {headers:{Authorization:'Bearer '+accessToken}}).then(r=>r.json());
          results = (data2.value||[]).map(u=>({
            name:u.displayName,
            email:(u.scoredEmailAddresses&&u.scoredEmailAddresses[0])?u.scoredEmailAddresses[0].address:''
          }));
        }
      } else {
        const sample=['Sarah Chen','Marcus Johnson','Priya Patel','Tom Williams','Lisa Park','Erik Moyer'];
        results=sample.filter(p=>p.toLowerCase().includes(query.toLowerCase())).map(p=>({name:p,email:p.toLowerCase().replace(' ','.')+'@admoyer.com'}));
      }
      if(!results.length){ dropdown.style.display='none'; return; }
      // Build dropdown items using a safe approach with data attributes
      dropdown.innerHTML = '';
      results.forEach(u=>{
        const div = document.createElement('div');
        div.style.cssText = 'padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)';
        div.innerHTML = '<div style="font-weight:500">'+u.name+'</div><div style="font-size:11px;color:var(--text3)">'+(u.email||'')+'</div>';
        div.onmousedown = function(){ selectPerson(u.name); };
        div.onmouseover = function(){ this.style.background='#f5f7fa'; };
        div.onmouseout = function(){ this.style.background=''; };
        dropdown.appendChild(div);
      });
      dropdown.style.display='block';
    }catch(e){ console.warn('People search error:',e); dropdown.style.display='none'; }
  }, 300);
}

function selectPerson(name){
  const input = document.getElementById('f-assign');
  if(input) input.value = name;
  const dropdown = document.getElementById('people-dropdown');
  if(dropdown) dropdown.style.display='none';
}

document.addEventListener('click', e=>{
  if(!e.target.closest('#f-assign') && !e.target.closest('#people-dropdown')){
    const dd=document.getElementById('people-dropdown');
    if(dd) dd.style.display='none';
  }
});
